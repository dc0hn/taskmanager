<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="paper" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="60%" stop-color="#f3eada"/>
      <stop offset="100%" stop-color="#e2d4b3"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1d10"/>
      <stop offset="100%" stop-color="#3d2c19"/>
    </linearGradient>
    <radialGradient id="seal" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c5573e"/>
      <stop offset="100%" stop-color="#8c3120"/>
    </radialGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.32  0 0 0 0 0.24  0 0 0 0 0.14  0 0 0 0.18 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base canvas -->
  <rect width="1024" height="1024" fill="url(#paper)"/>

  <!-- Subtle paper grain -->
  <rect width="1024" height="1024" fill="#3a2c1c" opacity="0.10" filter="url(#grain)"/>

  <!-- Outer hairline frame with corner notches -->
  <g stroke="#2a1d10" stroke-opacity="0.32" fill="none">
    <rect x="72" y="72" width="880" height="880" stroke-width="3" rx="2"/>
    <rect x="92" y="92" width="840" height="840" stroke-width="1.2" rx="1"/>
  </g>

  <!-- Top eyebrow: small caps "ALMANAC" -->
  <text x="512" y="200"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44" font-weight="500"
        letter-spacing="14"
        text-anchor="middle"
        fill="#3d2c19"
        opacity="0.78">
    ALMANAC
  </text>
  <line x1="380" y1="226" x2="644" y2="226" stroke="#2a1d10" stroke-opacity="0.32" stroke-width="1.5"/>

  <!-- Big serif italic A -->
  <text x="512" y="720"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="720"
        font-weight="500"
        text-anchor="middle"
        fill="url(#ink)"
        filter="url(#softShadow)">
    A
  </text>

  <!-- Wax seal accent bottom-right -->
  <g transform="translate(820 880)" filter="url(#softShadow)">
    <circle r="56" fill="url(#seal)"/>
    <circle r="44" fill="none" stroke="#fcd9a8" stroke-opacity="0.32" stroke-width="1.5"/>
    <text x="0" y="11"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic"
          font-size="42" font-weight="500"
          text-anchor="middle"
          fill="#fbf6e8">·</text>
  </g>

</svg>
