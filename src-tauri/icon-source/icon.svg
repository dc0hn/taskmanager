<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="paper" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#fbf6e8"/>
      <stop offset="55%" stop-color="#f3eada"/>
      <stop offset="100%" stop-color="#e0d1ae"/>
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1d10"/>
      <stop offset="100%" stop-color="#3d2c19"/>
    </linearGradient>
    <radialGradient id="seal" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#c5573e"/>
      <stop offset="100%" stop-color="#8c3120"/>
    </radialGradient>

    <!-- Apple macOS Big Sur+ icon template: 824×824 inside 1024 canvas, rx ≈ 185 -->
    <clipPath id="squircle">
      <rect x="100" y="100" width="824" height="824" rx="185" ry="185"/>
    </clipPath>

    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.32  0 0 0 0 0.24  0 0 0 0 0.14  0 0 0 0.16 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Parchment base -->
    <rect width="1024" height="1024" fill="url(#paper)"/>

    <!-- Subtle paper grain -->
    <rect width="1024" height="1024" fill="#3a2c1c" opacity="0.10" filter="url(#grain)"/>

    <!-- Inner hairline echoing the squircle -->
    <rect x="148" y="148" width="728" height="728" rx="140" ry="140"
          stroke="#2a1d10" stroke-opacity="0.28" stroke-width="2.2" fill="none"/>

    <!-- Top eyebrow -->
    <text x="512" y="280"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="42" font-weight="500"
          letter-spacing="12"
          text-anchor="middle"
          fill="#3d2c19"
          opacity="0.78">
      ALMANAC
    </text>
    <line x1="390" y1="304" x2="634" y2="304"
          stroke="#2a1d10" stroke-opacity="0.32" stroke-width="1.4"/>

    <!-- Big italic A, centered -->
    <text x="512" y="720"
          font-family="Georgia, 'Times New Roman', serif"
          font-style="italic"
          font-size="560"
          font-weight="500"
          text-anchor="middle"
          fill="url(#ink)"
          filter="url(#softShadow)">
      A
    </text>

    <!-- Wax seal accent -->
    <g transform="translate(720 812)" filter="url(#softShadow)">
      <circle r="42" fill="url(#seal)"/>
      <circle r="32" fill="none" stroke="#fcd9a8" stroke-opacity="0.32" stroke-width="1.4"/>
      <text x="0" y="9"
            font-family="Georgia, 'Times New Roman', serif"
            font-style="italic"
            font-size="32" font-weight="500"
            text-anchor="middle"
            fill="#fbf6e8">·</text>
    </g>
  </g>
</svg>
